# Production / EC2 overrides — swaps "localhost" URLs for the public IP
# EIP is normally set automatically by ansible/playbooks/configure-app.yml
# (curls ifconfig.me and passes it as an env var to `docker compose up`).
# Only export it yourself if running compose manually on the server:
#   export EIP=your.elastic.ip
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d

services:
  backend:
    environment:
      CORS_ORIGINS: "http://${EIP}:3000,http://${EIP},http://localhost:3000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "http://${EIP}:8000"
