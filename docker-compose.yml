# Run the full stack: db + backend + frontend + monitoring
# Usage: docker compose up --build
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass
      POSTGRES_DB: taskdb
    ports:
      - "5432:5432" # host:container — connect from Mac with localhost:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data # keep DB data between restarts
    healthcheck:
      # Backend waits until Postgres accepts connections
      test: ["CMD-SHELL", "pg_isready -U taskuser -d taskdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000" # API + Swagger docs at http://localhost:8000/docs
    environment:
      # Inside Docker, hostname `db` resolves to the db service (not localhost)
      DATABASE_URL: postgresql://taskuser:taskpass@db:5432/taskdb
      SECRET_KEY: dev-secret-change-in-production
      # For local: localhost. On EC2 use docker-compose.prod.yml (PUBLIC_HOST).
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # Browser calls this URL — must be reachable from the user's machine.
        # Local: localhost. EC2: use docker-compose.prod.yml with PUBLIC_HOST.
        VITE_API_URL: http://localhost:8000
    ports:
      - "3000:80" # http://localhost:3000
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090" # http://localhost:9090
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3001:3000" # http://localhost:3001 (3000 is already the frontend). Login: admin/admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data: # named volume for Postgres files
  prometheus_data:
  grafana_data:
